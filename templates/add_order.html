<!-- templates/add_order.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Добавить заказ</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Добавить заказ</h1>
    <a href="/orders">Назад к заказам</a>
    
    <form method="post">
        <p>
            <label>Клиент: *</label>
            <select name="клиент_id" required>
                <option value="">Выберите клиента</option>
                {% for client in clients %}
                <option value="{{ client.id }}">{{ client.имя }} {{ client.фамилия }}</option>
                {% endfor %}
            </select>
        </p>
        <p>
            <label>Курьер:</label>
            <select name="курьер_id">
                <option value="">Не назначен</option>
                {% for courier in couriers %}
                <option value="{{ courier.id }}">{{ courier.имя }} {{ courier.фамилия }}</option>
                {% endfor %}
            </select>
        </p>
        <p>
            <label>Сумма: *</label>
            <input type="number" step="0.01" name="сумма" required>
        </p>
        <p>
            <label>Способ оплаты:</label>
            <select name="способ_оплаты">
                <option value="cash">cash</option>
                <option value="card">card</option>
                <option value="online">online</option>
            </select>
        </p>
        <p>
            <label>Статус:</label>
            <select name="статус">
                <option value="pending">pending</option>
                <option value="in_progress">in_progress</option>
                <option value="delivered">delivered</option>
                <option value="cancelled">cancelled</option>
            </select>
        </p>
        <p>
            <label>Примечания:</label>
            <textarea name="примечания"></textarea>
        </p>
        <p>
            <input type="submit" value="Добавить">
        </p>
    </form>
</body>
</html>
