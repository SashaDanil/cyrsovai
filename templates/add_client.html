<!-- templates/add_client.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Добавить клиента</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Добавить клиента</h1>
    <a href="/clients">Назад к клиентам</a>
    
    <form method="post">
        <p>
            <label>Имя: *</label>
            <input type="text" name="имя" required>
        </p>
        <p>
            <label>Фамилия: *</label>
            <input type="text" name="фамилия" required>
        </p>
        <p>
            <label>Телефон: *</label>
            <input type="text" name="телефон" required>
        </p>
        <p>
            <label>Email:</label>
            <input type="email" name="email">
        </p>
        <p>
            <label>Адрес:</label>
            <input type="text" name="адрес">
        </p>
        <p>
            <label>Бонусы:</label>
            <input type="number" name="бонусы" value="0">
        </p>
        <p>
            <label>Категория:</label>
            <select name="категория">
                <option value="обычный">обычный</option>
                <option value="постоянный">постоянный</option>
                <option value="VIP">VIP</option>
            </select>
        </p>
        <p>
            <input type="submit" value="Добавить">
        </p>
    </form>
</body>
</html>
