<!-- templates/add_product.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Добавить товар</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Добавить товар</h1>
    <a href="/products">Назад к товарам</a>
    
    <form method="post">
        <p>
            <label>Название: *</label>
            <input type="text" name="название" required>
        </p>
        <p>
            <label>Описание:</label>
            <textarea name="описание"></textarea>
        </p>
        <p>
            <label>Цена: *</label>
            <input type="number" step="0.01" name="цена" required>
        </p>
        <p>
            <label>Вес (кг):</label>
            <input type="number" step="0.01" name="вес">
        </p>
        <p>
            <label>Категория:</label>
            <input type="text" name="категория">
        </p>
        <p>
            <label>Наличие:</label>
            <input type="number" name="наличие" value="0">
        </p>
        <p>
            <label>Рейтинг:</label>
            <input type="number" step="0.1" name="рейтинг" value="0">
        </p>
        <p>
            <input type="submit" value="Добавить">
        </p>
    </form>
</body>
</html>
